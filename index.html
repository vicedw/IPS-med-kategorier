<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ukens jobbspor i IPS Midt-Buskerud</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  min-height: 100%;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

body {
  color: white;
  background: linear-gradient(to bottom, #040814 0%, #0a1330 48%, #101d45 100%);
}

.page {
  min-height: 100vh;
  padding: 24px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 {
  margin: 0 0 18px;
  font-size: 34px;
  text-align: center;
}

.wheels-row {
  display: flex;
  gap: 42px;
  justify-content: center;
  align-items: flex-start;
  flex-wrap: wrap;
  width: 100%;
}

.wheel-section {
  text-align: center;
  position: relative;
  z-index: 2;
}

.main-wheel {
  width: 520px;
  max-width: 90vw;
}

.middle-row {
  width: 100%;
  display: flex;
  justify-content: center;
  margin-top: 24px;
}

.random-card {
  width: 360px;
  max-width: 90vw;
  background: rgba(15, 23, 42, 0.62);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 22px;
  padding: 20px 22px 22px;
  box-sizing: border-box;
  text-align: center;
  box-shadow: 0 12px 26px rgba(0,0,0,0.22);
}

.small-wheel {
  width: 330px;
  max-width: 90vw;
}

.wheel-wrap {
  position: relative;
  margin: 0 auto;
}

canvas.wheel {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 50%;
  background: transparent;
  filter: drop-shadow(0 0 18px rgba(255,255,255,0.10));
}

.pointer {
  position: absolute;
  top: -12px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 16px solid transparent;
  border-right: 16px solid transparent;
  border-top: 30px solid #f8fafc;
  z-index: 4;
  filter: drop-shadow(0 0 8px rgba(255,255,255,0.45));
}

button {
  margin-top: 18px;
  padding: 12px 28px;
  border-radius: 999px;
  border: none;
  font-size: 17px;
  font-weight: bold;
  color: #1f2937;
  background: linear-gradient(135deg, #7ed6a7, #8ccff8);
  cursor: pointer;
  box-shadow: 0 8px 22px rgba(0,0,0,0.28);
}

button.secondary {
  margin-top: 0;
  padding: 9px 14px;
  font-size: 13px;
  background: rgba(248, 250, 252, 0.92);
  box-shadow: 0 5px 14px rgba(0,0,0,0.18);
}

button.warning {
  margin-top: 0;
  padding: 9px 14px;
  font-size: 13px;
  background: #fecaca;
  box-shadow: 0 5px 14px rgba(0,0,0,0.18);
}

button:disabled {
  opacity: 0.72;
  cursor: default;
}

.message {
  margin-top: 12px;
  font-size: 22px;
  font-weight: 800;
  min-height: 28px;
}

.result {
  font-size: 26px;
  font-weight: 800;
  min-height: 32px;
  color: #facc15;
  text-shadow:
    0 0 10px rgba(250,204,21,0.55),
    0 0 20px rgba(250,204,21,0.35);
}

.small-wheel .message {
  font-size: 18px;
}

.small-wheel .result {
  font-size: 22px;
}

.side-panel {
  width: min(900px, 94vw);
  max-width: 90vw;
  background: rgba(15, 23, 42, 0.62);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 22px;
  padding: 16px;
  box-sizing: border-box;
  text-align: left;
  box-shadow: 0 12px 26px rgba(0,0,0,0.22);
  margin-top: 24px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.panel-section + .panel-section {
  margin-top: 0;
}

.panel-title {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.panel-title h2 {
  margin: 0;
  font-size: 20px;
}

.counter {
  font-size: 13px;
  color: rgba(255,255,255,0.78);
}

.hint {
  font-size: 13px;
  color: rgba(255,255,255,0.76);
  line-height: 1.35;
  margin-bottom: 10px;
}

.check-list, .done-list {
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.check-item, .done-item, .empty-state {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  border-radius: 14px;
  background: rgba(255,255,255,0.10);
  padding: 9px 10px;
  font-size: 15px;
}

.check-item label {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  width: 100%;
}

.check-item input {
  width: 18px;
  height: 18px;
  accent-color: #7ed6a7;
}

.done-item button {
  margin: 0;
  width: 26px;
  height: 26px;
  padding: 0;
  border-radius: 50%;
  box-shadow: none;
  background: #e2e8f0;
  color: #334155;
  font-size: 17px;
  line-height: 1;
  flex: 0 0 auto;
}

.empty-state {
  color: rgba(255,255,255,0.74);
  justify-content: center;
}

.panel-buttons {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 10px;
}

#confetti {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
}

@media (max-width: 980px) {
  .wheels-row {
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  .side-panel {
    width: min(520px, 94vw);
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="page">

  <h1>Ukens jobbspor i IPS Midt-Buskerud</h1>

  <div class="wheels-row">
    <div class="wheel-section main-wheel">

      <div class="wheel-wrap">
        <div class="pointer"></div>
        <canvas id="nameWheel" class="wheel" width="560" height="560"></canvas>
      </div>

      <button id="nameBtn">Snurr navn</button>

      <div class="message" id="nameMessage"></div>
      <div class="result" id="nameResult"></div>

    </div>

    <div class="wheel-section main-wheel">

      <div class="wheel-wrap">
        <div class="pointer"></div>
        <canvas id="topicWheel" class="wheel" width="560" height="560"></canvas>
      </div>

      <button id="topicBtn">Snurr tema</button>

      <div class="message" id="topicMessage"></div>
      <div class="result" id="topicResult"></div>

    </div>
  </div>

  <div class="middle-row">
    <div class="wheel-section random-card">

      <div style="font-size:22px; font-weight:bold; margin-bottom:18px;">
        Tilfeldig tall
      </div>

      <div style="display:flex; justify-content:center; align-items:center; gap:10px; margin-bottom:18px;">

        <input id="minNumber" type="number" min="1" max="25" value="1"
          style="width:70px; padding:10px; border-radius:999px; border:none; text-align:center; font-size:18px;">

        <span>til</span>

        <input id="maxNumber" type="number" min="1" max="25" value="25"
          style="width:70px; padding:10px; border-radius:999px; border:none; text-align:center; font-size:18px;">

      </div>

      <button id="randomNumberBtn">Velg tall</button>

      <div class="message" id="randomNumberMessage"></div>
      <div class="result" id="randomNumberResult"></div>

    </div>
  </div>

  <div class="side-panel">
    <div class="panel-section">
      <div class="panel-title">
        <h2>Fravær</h2>
      </div>
      <div class="hint">Huk av navn som ikke skal kunne trekkes akkurat nå.</div>
      <div class="check-list" id="absenceList"></div>
    </div>

    <div class="panel-section">
      <div class="panel-title">
        <h2>Gjennomført</h2>
        <div class="counter" id="completedCounter"></div>
      </div>
      <div class="hint">Navn som trekkes, flyttes hit og fjernes fra hjulet. Klikk × for å legge tilbake.</div>
      <div class="done-list" id="completedList"></div>
      <div class="panel-buttons">
        <button class="secondary" id="undoNameBtn" type="button">Angre siste</button>
        <button class="warning" id="newNameRoundBtn" type="button">Start ny runde</button>
      </div>
    </div>
  </div>

</div>

<script>
const confettiCanvas = document.getElementById("confetti");
const confettiCtx = confettiCanvas.getContext("2d");

function resizeConfetti() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}

resizeConfetti();
window.addEventListener("resize", resizeConfetti);

let audioCtx = null;
let tickTimer = null;
let activeSpinStart = null;
let activeSpinDuration = 5000;
let isAnyWheelSpinning = false;

function ensureAudioContext() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }
}

function playCasinoTick(volume = 0.025) {
  if (!audioCtx) return;

  const now = audioCtx.currentTime;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();

  filter.type = "bandpass";
  filter.frequency.value = 1500 + Math.random() * 350;
  filter.Q.value = 5;

  osc.type = "square";
  osc.frequency.setValueAtTime(850 + Math.random() * 260, now);

  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(volume, now + 0.004);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.045);

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start(now);
  osc.stop(now + 0.055);
}

function dynamicTickLoop() {
  if (!isAnyWheelSpinning) return;

  const elapsed = performance.now() - activeSpinStart;
  const progress = Math.min(elapsed / activeSpinDuration, 1);

  let interval;

  if (progress < 0.18) {
    interval = 140 - progress * 300;
  } else if (progress < 0.62) {
    interval = 55;
  } else {
    const slowPart = (progress - 0.62) / 0.38;
    interval = 55 + slowPart * 210;
  }

  interval = Math.max(45, Math.min(interval, 280));

  const volume = progress > 0.75 ? 0.03 : 0.022;

  playCasinoTick(volume);
  tickTimer = setTimeout(dynamicTickLoop, interval);
}

function startRouletteSound(duration) {
  ensureAudioContext();

  if (tickTimer) clearTimeout(tickTimer);

  activeSpinStart = performance.now();
  activeSpinDuration = duration;
  isAnyWheelSpinning = true;

  dynamicTickLoop();
}

function stopRouletteSound() {
  isAnyWheelSpinning = false;

  if (tickTimer) {
    clearTimeout(tickTimer);
    tickTimer = null;
  }
}

function playVictorySound() {
  ensureAudioContext();

  const now = audioCtx.currentTime;
  const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51];

  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "triangle";
    osc.frequency.setValueAtTime(freq, now + i * 0.09);

    gain.gain.setValueAtTime(0.0001, now + i * 0.09);
    gain.gain.exponentialRampToValueAtTime(0.16, now + i * 0.09 + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + i * 0.09 + 0.23);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(now + i * 0.09);
    osc.stop(now + i * 0.09 + 0.25);
  });
}

const confettiPieces = [];

function launchConfetti() {
  confettiPieces.length = 0;

  const confettiColors = [
    "#facc15", "#fde68a", "#ffffff", "#c7e7ff", "#f8d2e2", "#cfeecf"
  ];

  for (let i = 0; i < 240; i++) {
    confettiPieces.push({
      x: Math.random() * confettiCanvas.width,
      y: -20 - Math.random() * 220,
      w: 5 + Math.random() * 8,
      h: 7 + Math.random() * 10,
      dx: -2.5 + Math.random() * 5,
      dy: 2 + Math.random() * 5,
      rot: Math.random() * Math.PI * 2,
      drot: -0.25 + Math.random() * 0.5,
      color: confettiColors[Math.floor(Math.random() * confettiColors.length)],
      life: 120 + Math.random() * 45
    });
  }

  requestAnimationFrame(animateConfetti);
}

function animateConfetti() {
  confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);

  let alive = 0;

  for (const p of confettiPieces) {
    if (p.life <= 0) continue;

    p.x += p.dx;
    p.y += p.dy;
    p.dy += 0.035;
    p.rot += p.drot;
    p.life--;

    confettiCtx.save();
    confettiCtx.translate(p.x, p.y);
    confettiCtx.rotate(p.rot);
    confettiCtx.fillStyle = p.color;
    confettiCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    confettiCtx.restore();

    if (p.y < confettiCanvas.height + 60 && p.life > 0) {
      alive++;
    }
  }

  if (alive > 0) {
    requestAnimationFrame(animateConfetti);
  } else {
    confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  }
}

function normalize(a) {
  const full = Math.PI * 2;
  return ((a % full) + full) % full;
}

function easeOutCubic(t) {
  return 1 - Math.pow(1 - t, 3);
}

function normalizeName(name) {
  return String(name).trim().toLowerCase();
}

function makeRepeatedItems(baseItems, repeats) {
  const items = [];
  for (let i = 0; i < repeats; i++) {
    items.push(...baseItems);
  }
  return items;
}

function createWheel(config) {
  const canvas = document.getElementById(config.canvasId);
  const ctx = canvas.getContext("2d");
  const btn = document.getElementById(config.buttonId);
  const messageEl = document.getElementById(config.messageId);
  const resultEl = document.getElementById(config.resultId);

  const originalItems = config.items;
  const colors = config.colors;
  const size = canvas.width;
  const center = size / 2;
  const radius = size * 0.48;

  let rotation = 0;
  let spinning = false;
  let winningIndex = null;
  let lastWinningValue = null;

  function getItems() {
    if (typeof config.getItems === "function") {
      return config.getItems();
    }
    return originalItems;
  }

  function drawEmptyWheel(text) {
    ctx.clearRect(0, 0, size, size);
    ctx.beginPath();
    ctx.arc(center, center, radius, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255,0.12)";
    ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.35)";
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = "rgba(255,255,255,0.82)";
    ctx.font = "bold 24px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(text || "Ingen valg", center, center);
  }

  function drawWheel() {
    const items = getItems();

    if (items.length === 0) {
      drawEmptyWheel(config.emptyWheelText || "Ingen valg");
      return;
    }

    const slice = (Math.PI * 2) / items.length;

    ctx.clearRect(0, 0, size, size);

    for (let i = 0; i < items.length; i++) {
      const start = rotation + i * slice - Math.PI / 2;
      const end = start + slice;
      const isWinner = i === winningIndex;

      ctx.save();

      if (isWinner) {
        ctx.shadowColor = "rgba(250, 204, 21, 0.95)";
        ctx.shadowBlur = size > 500 ? 30 : 22;
      }

      ctx.beginPath();
      ctx.moveTo(center, center);
      ctx.arc(center, center, radius, start, end);
      ctx.closePath();

      ctx.fillStyle = isWinner ? "#facc15" : colors[i % colors.length];
      ctx.fill();

      ctx.lineWidth = isWinner ? 4 : 1;
      ctx.strokeStyle = isWinner
        ? "rgba(255,255,255,0.95)"
        : "rgba(255,255,255,0.35)";
      ctx.stroke();

      ctx.restore();

      ctx.save();
      ctx.translate(center, center);
      ctx.rotate(start + slice / 2);
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      ctx.fillStyle = isWinner ? "#111827" : "#1f2937";
      ctx.font = config.font || "bold 13px Arial";
      ctx.fillText(items[i], radius - 16, 0);
      ctx.restore();
    }

    ctx.beginPath();
    ctx.arc(center, center, size * 0.052, 0, Math.PI * 2);
    ctx.fillStyle = "#f8fafc";
    ctx.fill();

    ctx.beginPath();
    ctx.arc(center, center, size * 0.018, 0, Math.PI * 2);
    ctx.fillStyle = "#64748b";
    ctx.fill();
  }

  function spin() {
    if (spinning || isAnyWheelSpinning) return;

    const items = getItems();

    if (items.length === 0) {
      messageEl.textContent = config.emptyMessage || "Ingen tilgjengelige valg";
      resultEl.textContent = "";
      drawWheel();
      return;
    }

    spinning = true;
    btn.disabled = true;
    messageEl.textContent = "";
    resultEl.textContent = "";
    winningIndex = null;

    drawWheel();

    let availableIndexes = items
      .map((item, index) => ({ item, index }))
      .filter(entry => {
        if (!config.preventSameConsecutive) {
          return true;
        }

        const uniqueValues = [...new Set(items)];

        if (uniqueValues.length <= 1 || lastWinningValue === null) {
          return true;
        }

        return entry.item !== lastWinningValue;
      })
      .map(entry => entry.index);

    if (availableIndexes.length === 0) {
      availableIndexes = items.map((item, index) => index);
    }

    const chosenIndex = availableIndexes[Math.floor(Math.random() * availableIndexes.length)];
    const winner = items[chosenIndex];

    const slice = (Math.PI * 2) / items.length;
    const target = -chosenIndex * slice - slice / 2;

    let delta = normalize(target) - normalize(rotation);

    if (delta < 0) {
      delta += Math.PI * 2;
    }

    const duration = 5000;
    const final = rotation + delta + 10 * Math.PI * 2;
    const start = performance.now();
    const startRot = rotation;

    startRouletteSound(duration);

    function anim(now) {
      let t = (now - start) / duration;
      if (t > 1) t = 1;

      rotation = startRot + (final - startRot) * easeOutCubic(t);
      drawWheel();

      if (t < 1) {
        requestAnimationFrame(anim);
      } else {
        rotation = normalize(final);
        stopRouletteSound();

        winningIndex = chosenIndex;
        lastWinningValue = winner;

        drawWheel();

        messageEl.textContent = "Vi har en vinner!";
        resultEl.textContent = winner;

        if (typeof config.onWinner === "function") {
          config.onWinner(winner);
        }

        playVictorySound();
        launchConfetti();

        spinning = false;
        btn.disabled = false;
      }
    }

    requestAnimationFrame(anim);
  }

  btn.addEventListener("click", spin);
  drawWheel();

  return {
    redraw: function() {
      winningIndex = null;
      drawWheel();
    }
  };
}

const springColors = [
  "#cfeecf", "#ffdcb8", "#c7e7ff", "#f8d2e2",
  "#fff0b8", "#d9d4ff", "#bff4e6", "#ffd6d6",
  "#d8f3dc", "#fce7f3", "#bae6fd", "#fde68a",
  "#ddd6fe", "#bbf7d0", "#fecaca", "#bfdbfe",
  "#ccfbf1", "#e9d5ff", "#fed7aa", "#dcfce7"
];

const nameBase = [
  "Victoria",
  "Ivar",
  "Line",
  "Caroline",
  "Hans",
  "Hanna"
];

const repeatedNameItems = makeRepeatedItems(nameBase, 6);
const nameStorageKey = "ips-lykkehjul-gjennomfort-navn-v1";

let completedNames = [];
let completedHistory = [];
let absentNames = [];
let nameWheelControl = null;

const absenceListEl = document.getElementById("absenceList");
const completedListEl = document.getElementById("completedList");
const completedCounterEl = document.getElementById("completedCounter");
const undoNameBtn = document.getElementById("undoNameBtn");
const newNameRoundBtn = document.getElementById("newNameRoundBtn");

function loadNameState() {
  try {
    const raw = localStorage.getItem(nameStorageKey);
    if (!raw) return;

    const data = JSON.parse(raw);
    const valid = new Set(nameBase.map(normalizeName));

    if (Array.isArray(data.completedNames)) {
      completedNames = data.completedNames
        .filter(name => valid.has(normalizeName(name)))
        .filter((name, index, arr) => arr.findIndex(other => normalizeName(other) === normalizeName(name)) === index);
    }

    if (Array.isArray(data.completedHistory)) {
      completedHistory = data.completedHistory.filter(name => valid.has(normalizeName(name)));
    }
  } catch (e) {
    completedNames = [];
    completedHistory = [];
  }
}

function saveNameState() {
  localStorage.setItem(nameStorageKey, JSON.stringify({
    completedNames,
    completedHistory
  }));
}

function getNameSet(list) {
  return new Set(list.map(normalizeName));
}

function getAvailableNameItems() {
  const completedSet = getNameSet(completedNames);
  const absentSet = getNameSet(absentNames);

  return repeatedNameItems.filter(name =>
    !completedSet.has(normalizeName(name)) &&
    !absentSet.has(normalizeName(name))
  );
}

function addCompletedName(name) {
  const completedSet = getNameSet(completedNames);

  if (!completedSet.has(normalizeName(name))) {
    completedNames.push(name);
    completedHistory.push(name);
    saveNameState();
    renderNamePanels();
  }
}

function removeCompletedName(name) {
  const target = normalizeName(name);
  completedNames = completedNames.filter(item => normalizeName(item) !== target);
  completedHistory = completedHistory.filter(item => normalizeName(item) !== target);
  saveNameState();
  renderNamePanels();
}

function renderAbsenceList() {
  const completedSet = getNameSet(completedNames);
  absenceListEl.innerHTML = "";

  nameBase.forEach(name => {
    const row = document.createElement("div");
    row.className = "check-item";

    const label = document.createElement("label");
    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.checked = getNameSet(absentNames).has(normalizeName(name));
    checkbox.disabled = completedSet.has(normalizeName(name));

    checkbox.addEventListener("change", () => {
      if (checkbox.checked) {
        if (!getNameSet(absentNames).has(normalizeName(name))) {
          absentNames.push(name);
        }
      } else {
        absentNames = absentNames.filter(item => normalizeName(item) !== normalizeName(name));
      }

      if (nameWheelControl) nameWheelControl.redraw();
    });

    const text = document.createElement("span");
    text.textContent = completedSet.has(normalizeName(name)) ? `${name} (gjennomført)` : name;

    label.appendChild(checkbox);
    label.appendChild(text);
    row.appendChild(label);
    absenceListEl.appendChild(row);
  });
}

function renderCompletedList() {
  completedListEl.innerHTML = "";
  completedCounterEl.textContent = `${completedNames.length}/${nameBase.length}`;

  if (completedNames.length === 0) {
    const empty = document.createElement("div");
    empty.className = "empty-state";
    empty.textContent = "Ingen navn er gjennomført ennå.";
    completedListEl.appendChild(empty);
    return;
  }

  completedNames.forEach(name => {
    const item = document.createElement("div");
    item.className = "done-item";

    const span = document.createElement("span");
    span.textContent = name;

    const removeBtn = document.createElement("button");
    removeBtn.type = "button";
    removeBtn.textContent = "×";
    removeBtn.title = `Legg ${name} tilbake i hjulet`;
    removeBtn.addEventListener("click", () => removeCompletedName(name));

    item.appendChild(span);
    item.appendChild(removeBtn);
    completedListEl.appendChild(item);
  });
}

function renderNamePanels() {
  renderAbsenceList();
  renderCompletedList();
  if (nameWheelControl) nameWheelControl.redraw();
}

undoNameBtn.addEventListener("click", () => {
  const last = completedHistory.pop();
  if (!last) return;

  completedNames = completedNames.filter(name => normalizeName(name) !== normalizeName(last));
  saveNameState();
  renderNamePanels();
});

newNameRoundBtn.addEventListener("click", () => {
  completedNames = [];
  completedHistory = [];
  saveNameState();
  renderNamePanels();
});

loadNameState();

nameWheelControl = createWheel({
  canvasId: "nameWheel",
  buttonId: "nameBtn",
  messageId: "nameMessage",
  resultId: "nameResult",
  items: repeatedNameItems,
  getItems: getAvailableNameItems,
  onWinner: addCompletedName,
  emptyWheelText: "Ingen navn igjen",
  emptyMessage: "Ingen navn er tilgjengelige",
  colors: springColors,
  font: "bold 13px Arial"
});

renderNamePanels();

createWheel({
  canvasId: "topicWheel",
  buttonId: "topicBtn",
  messageId: "topicMessage",
  resultId: "topicResult",
  items: makeRepeatedItems([
    "Jobbstøtteplan",
    "Karriereprofil",
    "Åpenhet",
    "Økonomi",
    "Samarbeid",
    "Jobbutvikling"
  ], 4),
  preventSameConsecutive: true,
  colors: springColors,
  font: "bold 10px Arial"
});

const randomNumberBtn = document.getElementById("randomNumberBtn");
const randomNumberMessage = document.getElementById("randomNumberMessage");
const randomNumberResult = document.getElementById("randomNumberResult");

randomNumberBtn.addEventListener("click", () => {
  let min = Number(document.getElementById("minNumber").value);
  let max = Number(document.getElementById("maxNumber").value);

  min = Math.max(1, Math.min(25, min));
  max = Math.max(1, Math.min(25, max));

  if (min > max) {
    const temp = min;
    min = max;
    max = temp;
  }

  document.getElementById("minNumber").value = min;
  document.getElementById("maxNumber").value = max;

  const number = Math.floor(Math.random() * (max - min + 1)) + min;

  randomNumberMessage.textContent = "Tilfeldig tall:";
  randomNumberResult.textContent = number;

  playVictorySound();
  launchConfetti();
});
</script>

</body>
